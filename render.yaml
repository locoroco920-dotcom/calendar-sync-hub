services:
  - type: web
    name: meadowlands-event-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
